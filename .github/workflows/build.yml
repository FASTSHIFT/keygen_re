name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libsdl2-dev clang-format-14

      - name: Check format
        run: CLANG_FORMAT=clang-format-14 ./scripts/format.sh --check

      - name: Configure
        run: cmake -B build -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build --parallel
